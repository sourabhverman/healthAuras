<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HealthAuras</title>
    <meta name="robots" content="noindex, follow" />
    <script>
      (function () {
        // SPA fallback: encode the requested path and hand it to index.html via ?p=
        // This fires only when the CDN _redirects rule did not catch the route.
        var path = window.location.pathname + window.location.search + window.location.hash;
        window.location.replace('/?p=' + encodeURIComponent(path));
      })();
    </script>
  </head>
  <body></body>
</html>
